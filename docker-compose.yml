services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bdii
      POSTGRES_PASSWORD: bdii
      POSTGRES_DB: multimodal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bdii -d multimodal"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://bdii:bdii@db:5432/multimodal
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/data:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
